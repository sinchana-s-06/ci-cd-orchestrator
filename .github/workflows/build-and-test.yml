name: Build and Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore OrchestratorSolution.slnx

      - name: Build solution
        run: dotnet build OrchestratorSolution.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test OrchestratorSolution.slnx --configuration Release --no-build
